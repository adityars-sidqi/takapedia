spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${services.auth.url}
              predicates:
                - Path=/api/v1/auth/**
            - id: product-service
              uri: ${services.product.url}
              predicates:
                - Path=/api/v1/products/**

services:
  auth:
    url: http://localhost:8081
  product:
    url: http://localhost:8082