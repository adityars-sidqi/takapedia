spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: takapedia
    password: takapedia_dev

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:dev-secret-ganti-di-production-minimal-32-byte-untuk-HS256}
  expiration-ms: 900000   # 15 menit