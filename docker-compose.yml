services:
  postgres:
    image: postgres:16-alpine
    container_name: takapedia-postgres
    environment:
      POSTGRES_USER: takapedia
      POSTGRES_PASSWORD: takapedia_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: takapedia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: